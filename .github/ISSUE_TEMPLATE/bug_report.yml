name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what you expected vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Start Nexus with `docker compose up -d`
        2. Go to ...
        3. Click ...
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Nexus version or commit
      placeholder: e.g. v0.1.0 or commit SHA
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Bus (FastAPI backend)
        - Dashboard
        - Python SDK
        - JavaScript SDK
        - Demo pipeline
        - Documentation
        - Docker / infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste relevant logs, stack traces, or browser console output.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this report
          required: true
