name: Feature request
description: Suggest an idea for Nexus
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is it for?
      placeholder: As a developer building multi-agent systems, I want ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Bus (FastAPI backend)
        - Dashboard
        - Python SDK
        - JavaScript SDK
        - Demo pipeline
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this request
          required: true
